# ============================================
# prometheus.yml — Configuration Prometheus
# TP8 - Spring Boot Monitoring
# ============================================

global:
  scrape_interval: 5s      # Fréquence de collecte des métriques
  evaluation_interval: 5s  # Fréquence d'évaluation des règles

# Règles d'alertes
rule_files:
  - "alert-rules.yml"

# Configuration de la collecte
scrape_configs:

  # Collecte des métriques de l'application Spring Boot
  - job_name: 'spring-boot-app'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['localhost:8080']
        labels:
          app: 'tp8-monitoring'
          env: 'development'

  # Collecte des métriques de Prometheus lui-même
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
